services:
  - type: web
    name: employee-management-api
    env: docker
    region: singapore
    plan: free
    rootDir: employee-management-api
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_DATASOURCE_DRIVER
        value: org.postgresql.Driver
      - key: SPRING_JPA_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: CORS_ORIGINS
        value: https://ems.prigenix.com
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /tmp/uploads/photos
      - key: UPLOAD_DIR_DOCS
        value: /tmp/uploads/documents
      - key: UPLOAD_DIR_COMPANY
        value: /tmp/uploads/company
      - key: LOG_LEVEL
        value: INFO
      - key: APP_BASE_URL
        value: https://api.prigenix.com

  - type: web
    name: employee-management-ui
    env: static
    region: singapore
    plan: free
    rootDir: employee-management-ui
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist/employee-management-ui/browser
    envVars:
      - key: NODE_VERSION
        value: 18
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
