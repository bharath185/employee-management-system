# ============================================================
# Employee Management System - Application Configuration
# ============================================================

# Server
server.port=${PORT:8080}
server.servlet.context-path=/api/v1
server.error.include-message=always
server.error.include-stacktrace=never

# Database — local dev uses MSSQL, production overrides via env vars
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=employee_management;encrypt=false;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Rim@admin}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.microsoft.sqlserver.jdbc.SQLServerDriver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.SQLServerDialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:c2VjdXJlLXNlY3JldC1rZXktZm9yLWVtcGxveWVlLW1hbmFnZW1lbnQtc3lzdGVtLTIwMjYtcHJvZHVjdGlvbi1ncmFkZQ==}
app.jwt.access-token-expiration=${JWT_ACCESS_EXPIRY:86400000}
app.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRY:604800000}
app.jwt.issuer=employee-management-system

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.photo.upload-dir=${UPLOAD_DIR:uploads/photos}
app.document.upload-dir=${UPLOAD_DIR_DOCS:uploads/documents}
app.photo.allowed-types=image/jpeg,image/png

# OpenAI (Text2SQL)
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=gpt-4o-mini

# Gemini (Text2SQL — free tier)
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=gemini-2.0-flash
app.db.type=${DB_TYPE:postgresql}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# Logging
logging.level.com.ems=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=INFO
logging.file.name=logs/employee-management.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Initial seed data
app.data.seed-on-startup=true
app.data.admin-username=ADMIN
app.data.admin-password=Admin@123
app.data.admin-email=admin@company.com
